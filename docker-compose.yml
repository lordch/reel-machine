services:
  api:
    build: .
    ports:
      - "3001:3001"
    env_file: .env
    volumes:
      - ./scenarios:/app/scenarios
      - ./products:/app/products
      - ./knowledge:/app/knowledge
      - ./public:/app/public
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=reel.darkhelmettechnologies.com
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://reel.darkhelmettechnologies.com/
      - META_PAGE_ID=${META_PAGE_ID}
      - META_IG_USER_ID=${META_IG_USER_ID}
      - META_PAGE_ACCESS_TOKEN=${META_PAGE_ACCESS_TOKEN}
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      - api
      - n8n

volumes:
  n8n_data:
  caddy_data:
  caddy_config:
